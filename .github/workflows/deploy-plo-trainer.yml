name: Deploy PLO Trainer to GitHub Pages

on:
  push:
    branches: [claude/plo-poker-sim-android-app-bnixam, master]
    paths: [plo-trainer/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plo-trainer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: plo-trainer

      - name: Build
        run: npm run build
        working-directory: plo-trainer
        env:
          VITE_BASE: /my-youtube-skills/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: plo-trainer/dist

      - id: deployment
        uses: actions/deploy-pages@v4
